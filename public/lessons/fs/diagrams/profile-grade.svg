<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 340" role="img" aria-label="A road profile: the existing ground line, the proposed grade with two tangent grades meeting at a summit vertical curve, and cut and fill between them along the stations.">
  <style>
    text{stroke:none}
    .ttl{font:700 15px Arial,Helvetica,sans-serif;fill:#111827}
    .lab{font:700 12px Arial,Helvetica,sans-serif;fill:#111827}
    .lbl{font:700 13px Arial,Helvetica,sans-serif;fill:#111827}
    .axis{stroke:#94a3b8;stroke-width:1.4}
    .ground{stroke:#8b5e34;stroke-width:2.5;fill:none}
    .grade{stroke:#1d3095;stroke-width:2.5;fill:none}
    .cut{fill:#fde2e2;opacity:.7}
    .fill{fill:#dceddc;opacity:.7}
    .pt{fill:#bd1218}
  </style>
  <rect width="620" height="340" fill="#ffffff"/>
  <text class="ttl" x="20" y="26">Road profile — grade line vs. existing ground</text>

  <!-- axes -->
  <line class="axis" x1="60" y1="270" x2="590" y2="270"/>
  <line class="axis" x1="60" y1="60" x2="60" y2="270"/>
  <text class="lab" x="30" y="150" transform="rotate(-90 30 150)">Elevation</text>

  <!-- fill region (grade above ground, left) and cut region (grade below ground, right) -->
  <path class="fill" d="M 90 210 L 300 120 L 300 175 L 90 235 Z"/>
  <path class="cut" d="M 300 120 L 520 175 L 520 120 L 300 90 Z"/>

  <!-- existing ground (irregular brown) -->
  <path class="ground" d="M 90 235 C 180 250, 240 190, 300 175 C 360 160, 460 150, 520 175"/>
  <!-- proposed grade: g1 up to PVI(300,90) then g2 down (summit vertical curve) -->
  <path class="grade" d="M 90 210 L 270 100 Q 300 84 330 100 L 520 175"/>
  <circle class="pt" cx="300" cy="90" r="5"/>
  <text class="lbl" x="292" y="80" text-anchor="end">PVI</text>

  <!-- grade + region labels -->
  <text class="lbl" x="160" y="150" fill="#1d3095">+g₁</text>
  <text class="lbl" x="440" y="120" fill="#1d3095">−g₂</text>
  <text class="lbl" x="180" y="228" fill="#8b5e34">existing ground</text>
  <text class="lab" x="180" y="205">FILL</text>
  <text class="lab" x="410" y="150">CUT</text>

  <!-- station ticks -->
  <g class="axis"><line x1="90" y1="266" x2="90" y2="274"/><line x1="300" y1="266" x2="300" y2="274"/><line x1="520" y1="266" x2="520" y2="274"/></g>
  <g class="lab"><text x="90" y="290" text-anchor="middle">10+00</text><text x="300" y="290" text-anchor="middle">15+00</text><text x="520" y="290" text-anchor="middle">20+00</text></g>
  <text class="lab" x="325" y="316" text-anchor="middle">Station →</text>
</svg>
