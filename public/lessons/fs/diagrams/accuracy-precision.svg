<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 250" role="img" aria-label="Four targets contrasting accuracy and precision: accurate and precise, precise but not accurate, accurate on average but not precise, and neither.">
  <style>
    .ttl{font:700 15px 'Segoe UI',sans-serif;fill:#0b1220}
    .cap{font:12px 'Segoe UI',sans-serif;fill:#374151}
    .ring{fill:none;stroke:#cbd5e1;stroke-width:2}
    .bull{fill:#fde68a;stroke:#d97706;stroke-width:1.5}
    .shot{fill:#1d3095}
  </style>
  <rect width="640" height="250" fill="#ffffff"/>
  <text class="ttl" x="20" y="26">Accuracy vs. precision</text>

  <!-- Panel 1: accurate + precise (tight cluster on bullseye) -->
  <g transform="translate(80,120)">
    <circle class="ring" r="55"/><circle class="ring" r="37"/><circle class="ring" r="19"/><circle class="bull" r="7"/>
    <circle class="shot" cx="1" cy="-2" r="3.2"/><circle class="shot" cx="4" cy="3" r="3.2"/><circle class="shot" cx="-3" cy="2" r="3.2"/><circle class="shot" cx="-1" cy="-5" r="3.2"/><circle class="shot" cx="3" cy="-4" r="3.2"/>
    <text class="cap" x="0" y="80" text-anchor="middle">Accurate &amp; precise</text>
  </g>
  <!-- Panel 2: precise, not accurate (tight cluster off-center) -->
  <g transform="translate(240,120)">
    <circle class="ring" r="55"/><circle class="ring" r="37"/><circle class="ring" r="19"/><circle class="bull" r="7"/>
    <circle class="shot" cx="26" cy="-22" r="3.2"/><circle class="shot" cx="30" cy="-17" r="3.2"/><circle class="shot" cx="23" cy="-16" r="3.2"/><circle class="shot" cx="28" cy="-25" r="3.2"/><circle class="shot" cx="33" cy="-20" r="3.2"/>
    <text class="cap" x="0" y="80" text-anchor="middle">Precise, not accurate</text>
  </g>
  <!-- Panel 3: accurate on average, not precise (scattered around center) -->
  <g transform="translate(400,120)">
    <circle class="ring" r="55"/><circle class="ring" r="37"/><circle class="ring" r="19"/><circle class="bull" r="7"/>
    <circle class="shot" cx="-24" cy="6" r="3.2"/><circle class="shot" cx="20" cy="14" r="3.2"/><circle class="shot" cx="3" cy="-26" r="3.2"/><circle class="shot" cx="-8" cy="22" r="3.2"/><circle class="shot" cx="14" cy="-12" r="3.2"/>
    <text class="cap" x="0" y="80" text-anchor="middle">Accurate on average</text>
  </g>
  <!-- Panel 4: neither (scattered + off-center) -->
  <g transform="translate(560,120)">
    <circle class="ring" r="55"/><circle class="ring" r="37"/><circle class="ring" r="19"/><circle class="bull" r="7"/>
    <circle class="shot" cx="-30" cy="-20" r="3.2"/><circle class="shot" cx="-14" cy="-30" r="3.2"/><circle class="shot" cx="-34" cy="-6" r="3.2"/><circle class="shot" cx="-20" cy="10" r="3.2"/><circle class="shot" cx="-40" cy="-24" r="3.2"/>
    <text class="cap" x="0" y="80" text-anchor="middle">Neither</text>
  </g>
</svg>
