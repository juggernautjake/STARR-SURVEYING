<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" role="img" aria-label="Curvature and refraction in leveling: the earth curves away from a level line of sight, making distant rod readings too high, while atmospheric refraction bends the sight back down by about one seventh.">
  <style>text{stroke:none;paint-order:fill}
    .ttl{font:700 15px Arial,Helvetica,sans-serif;fill:#111827}
    .earth{fill:#eaf4ea;stroke:#4d7c4d;stroke-width:2}
    .sight{fill:none;stroke:#1d3095;stroke-width:2}
    .refr{fill:none;stroke:#059669;stroke-width:2;stroke-dasharray:6 4}
    .instr{fill:#111827}
    .lab{font:700 12px Arial,Helvetica,sans-serif;fill:#111827}
    .lblb{font:700 12px Arial,Helvetica,sans-serif;fill:#111827}
    .dim{stroke:#dc2626;stroke-width:1.5}
  </style>
  <rect width="620" height="300" fill="#ffffff"/>
  <text class="ttl" x="20" y="26">Curvature &amp; refraction on a level sight</text>

  <!-- curved earth surface (arc) -->
  <path class="earth" d="M 60 210 Q 320 150 580 210 L 580 290 L 60 290 Z"/>

  <!-- instrument at left -->
  <rect class="instr" x="78" y="150" width="16" height="10"/>
  <line x1="86" y1="160" x2="86" y2="205" stroke="#0b1220" stroke-width="2"/>
  <text class="lab" x="86" y="228" text-anchor="middle">level</text>

  <!-- horizontal line of sight (straight, tangent) -->
  <line class="sight" x1="94" y1="152" x2="575" y2="152"/>
  <text class="lblb" x="300" y="145" text-anchor="middle" fill="#1d3095">horizontal line of sight</text>

  <!-- refracted line (bends down ~1/7) -->
  <path class="refr" d="M 94 152 Q 340 158 560 176"/>
  <text class="lblb" x="470" y="150" text-anchor="middle" fill="#059669">refracted ray</text>

  <!-- rod at right + error bracket -->
  <line x1="560" y1="152" x2="560" y2="205" stroke="#334155" stroke-width="3"/>
  <line class="dim" x1="575" y1="152" x2="575" y2="176"/>
  <text class="lab" x="588" y="168" fill="#dc2626">c − r</text>

  <text class="lab" x="20" y="284">Curvature raises the reading; refraction offsets ≈1/7. Net c − r ≈ 0.0206·F² ft (F in 1000s of ft).</text>
</svg>
