<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stardust Rhapsody — Galactic Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Caveat:wght@500;700&family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Michroma&family=Orbitron:wght@500;600;700&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="labels.js"></script>
<script src="/dnd/maps/sky2d.js"></script>
<script type="importmap">
{ "imports": {
  "three": "/dnd/maps/vendor/three/three.module.js",
  "three/addons/": "/dnd/maps/vendor/three/addons/"
}}
</script>
<style>
  :root{--void:#010a13;--ink:#f0e6d2;--dim:#a09b8c;--faint:#6d6a5f;--gold:#c89b3c;--aether:#c8aa6e;--scan:#0ac8b9;--amber:#c8aa6e;--red:#c6403b;--green:#0ac8b9;
    --steel:#0b1a2c;--steel2:#10233b;--steelhi:#16304a;--bezel:#010a13;--screen:#02121a;--screenglow:#0ac8b9;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--void);}
  body{font-family:"Rajdhani",system-ui,sans-serif;color:var(--ink);display:flex;flex-direction:column;}
  #mapPane{position:relative;flex:1;min-height:0;overflow:hidden;background:radial-gradient(ellipse 62% 60% at 50% 46%,#1a1240 0%,#0c0820 42%,#04030a 82%);}
  #stage{position:absolute;inset:0;cursor:grab;}
  #stage.grabbing{cursor:grabbing;}
  #viewport{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform;}
  #viewport.animate{transition:transform .85s cubic-bezier(.55,.05,.2,1);}
  #fxCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5;}
  #bgLayer{position:absolute;inset:0;z-index:0;pointer-events:none;background-position:center center;background-repeat:no-repeat;display:none;}
  .titlecard{position:absolute;top:16px;left:0;right:0;text-align:center;z-index:20;pointer-events:none;}
  .titlecard h1{margin:0;font-family:"Cinzel",serif;font-weight:700;font-size:22px;letter-spacing:9px;color:#fff;text-shadow:0 0 26px rgba(200,138,255,.5),0 2px 8px #000;}
  .titlecard .tag{font-family:"Share Tech Mono",monospace;font-size:11px;letter-spacing:4px;color:var(--scan);opacity:.8;margin-top:3px;}
  .legend{position:absolute;top:14px;left:14px;z-index:20;background:rgba(8,10,22,.7);border:1px solid rgba(120,140,200,.2);border-radius:10px;padding:10px 12px;backdrop-filter:blur(8px);max-width:200px;max-height:44vh;overflow-y:auto;}
  .legend h3{margin:0 0 7px;font-family:"Orbitron";font-size:9px;letter-spacing:2px;color:var(--scan);font-weight:600;}
  .legrow{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--dim);padding:2px 0;cursor:pointer;line-height:1.15;}
  .legrow:hover{color:var(--ink);}
  .legrow .dot{width:9px;height:9px;border-radius:2px;flex:none;border:1px solid rgba(255,255,255,.2);}
  .legrow.sub{padding-left:12px;font-size:11px;}
  .legdiv{height:1px;background:rgba(120,140,200,.18);margin:6px 0;}
  .mapnav{position:absolute;top:14px;right:14px;z-index:20;display:flex;flex-direction:column;gap:5px;}
  .mapnav button{width:34px;height:34px;border-radius:8px;background:rgba(20,26,48,.85);border:1px solid rgba(120,140,200,.28);color:var(--ink);font-size:15px;cursor:pointer;backdrop-filter:blur(6px);transition:.12s;font-family:"Orbitron";}
  .mapnav button:hover{border-color:var(--scan);color:var(--scan);}
  .campbtn{position:absolute;top:14px;right:60px;z-index:21;background:rgba(20,26,48,.85);border:1px solid rgba(200,138,255,.4);color:var(--aether);border-radius:8px;padding:8px 13px;font-size:12px;cursor:pointer;backdrop-filter:blur(6px);letter-spacing:.5px;}
  .campbtn:hover{border-color:var(--aether);color:#fff;}
  .sector-label{position:absolute;transform:translate(-50%,-50%);font-family:"Cinzel",serif;font-weight:600;letter-spacing:3px;text-transform:uppercase;pointer-events:none;text-align:center;white-space:nowrap;text-shadow:0 0 16px currentColor,0 2px 7px #000;}
  .body{position:absolute;transform:translate(-50%,-50%);cursor:pointer;}
  .body .art{width:100%;height:100%;pointer-events:none;position:relative;}
  .body .artbg{position:absolute;inset:0;border-radius:50%;pointer-events:none;}   /* opaque backing so a solid body occludes the starfield */
  /* Hybrid view: the 3D overlay draws the 3D-native bodies, so hide their 2D art/POIs/name */
  html.map-hybrid .body.n3d .art, html.map-hybrid .body.n3d .poilayer, html.map-hybrid .body.n3d .bname{opacity:0;}
  .body .artwrap{position:relative;z-index:1;width:100%;height:100%;}
  .body .poilayer{position:absolute;inset:0;pointer-events:none;z-index:6;}
  .body .poi{position:absolute;transform:translate(-50%,-50%);filter:drop-shadow(0 1px 3px #000);pointer-events:auto;cursor:pointer;}
  .body .poi svg{display:block;}
  .body .halo{position:absolute;inset:-35%;border-radius:50%;opacity:0;transition:opacity .25s;pointer-events:none;}
  .body:hover .halo{opacity:.85;}
  .body.selected .halo{opacity:1;}
  .body .bname{position:absolute;left:50%;top:100%;transform:translateX(-50%);margin-top:5px;font-family:"Rajdhani";font-weight:600;font-size:12px;letter-spacing:.5px;color:#eaf2ff;white-space:nowrap;text-shadow:0 1px 6px #000,0 0 12px #000;pointer-events:none;opacity:.9;}
  .body .bname.cap{color:var(--gold);}
  .body:hover{z-index:200 !important;}
  .body.selected{z-index:150 !important;}
  .selring{position:absolute;inset:-22%;border-radius:50%;border:1.5px solid var(--scan);opacity:0;pointer-events:none;box-shadow:0 0 14px var(--scan),inset 0 0 14px rgba(67,224,200,.3);}
  .body.selected .selring{opacity:.9;animation:selspin 8s linear infinite;}
  .body.hovered:not(.selected) .selring{opacity:.4;}   /* soft target preview on hover */
  .body.hovered:not(.selected){cursor:pointer;}
  @keyframes selspin{to{transform:rotate(360deg);}}
  @keyframes spin{to{transform:rotate(360deg);}}@keyframes cspin{to{transform:rotate(-360deg);}}
  @keyframes breathe{0%,100%{opacity:.72;transform:scale(1);}50%{opacity:1;transform:scale(1.05);}}
  @keyframes twinkle{0%,100%{opacity:.45;}50%{opacity:1;}}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;}#viewport.animate{transition:none;}}
  #console{flex:none;height:246px;position:relative;z-index:30;background:linear-gradient(180deg,#0c1020 0%,#141a30 8%,#191f38 100%);border-top:2px solid #000;box-shadow:0 -1px 0 rgba(120,140,200,.15) inset, 0 -20px 40px rgba(0,0,0,.5);display:flex;align-items:stretch;padding:12px 14px;gap:12px;transition:height .32s cubic-bezier(.4,0,.2,1),padding .32s cubic-bezier(.4,0,.2,1);}
  /* minimize / slide-down deck (Slice 6) */
  #console.min{height:30px;padding-top:0;padding-bottom:0;overflow:hidden;cursor:pointer;}
  #console.min .bank,#console.min .screenframe,#console.min .rcluster{visibility:hidden;}
  #deckMin{position:absolute;top:6px;right:14px;z-index:6;width:28px;height:20px;border:1px solid #000;border-radius:5px;background:linear-gradient(180deg,#2a3252,#161c34);color:var(--dim);font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(150,170,230,.2),0 1px 2px #000;transition:.2s;}
  #deckMin:hover{color:var(--scan);border-color:var(--scan);}
  #console.min #deckMin{transform:rotate(180deg);}
  #deckLabel{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-family:"Orbitron";font-size:11px;letter-spacing:4px;color:var(--scan);text-shadow:0 0 9px var(--scan);pointer-events:none;}
  #console.min #deckLabel{display:flex;}
  /* HELM controls + screen tint/distortion (Slice 7) */
  #console{--tint-hue:0deg;--distort:0;}
  .scr-inner{filter:hue-rotate(var(--tint-hue)) contrast(calc(1 + var(--distort)*0.28)) saturate(calc(1 + var(--distort)*0.5));animation:crtjit .16s steps(2) infinite;}
  @keyframes crtjit{0%{transform:translate(0,0);}50%{transform:translate(calc(var(--distort)*1.3px),calc(var(--distort)*-0.7px));}100%{transform:translate(calc(var(--distort)*-0.9px),calc(var(--distort)*0.4px));}}
  .screen::before{content:"";position:absolute;inset:0;z-index:6;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.55) 0 1px,transparent 1px 3px);mix-blend-mode:multiply;opacity:calc(var(--distort)*0.9);}
  .screen{position:relative;}
  .helm{width:150px;flex:none;background:linear-gradient(160deg,var(--steel2),var(--steel));border:1px solid #000;border-radius:9px;padding:9px;display:flex;flex-direction:column;gap:8px;box-shadow:inset 0 1px 0 rgba(140,160,220,.15), inset 0 0 20px rgba(0,0,0,.4);}
  .dpad{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,20px);gap:3px;justify-items:center;align-items:center;}
  .dpad button{width:100%;height:100%;border:1px solid #000;border-radius:4px;background:linear-gradient(180deg,var(--steelhi),var(--steel));color:var(--dim);font-size:10px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(150,170,230,.2),0 1px 2px #000;padding:0;}
  .dpad button:hover{color:var(--scan);border-color:var(--scan);}
  .dpad button:active{transform:translateY(1px);}
  .dpad .u{grid-column:2;grid-row:1;}.dpad .l{grid-column:1;grid-row:2;}.dpad .c{grid-column:2;grid-row:2;}.dpad .r{grid-column:3;grid-row:2;}.dpad .d{grid-column:2;grid-row:3;}
  .helm .slab{font-family:"Share Tech Mono";font-size:9px;letter-spacing:1px;color:#8ea;display:flex;justify-content:space-between;}
  .helm input[type=range]{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:#0c1226;border-radius:3px;outline:none;}
  .helm input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--scan);box-shadow:0 0 6px var(--scan);cursor:pointer;}
  .minibtn{flex:1;border:1px solid #000;border-radius:5px;background:linear-gradient(180deg,var(--steelhi),var(--steel));color:var(--dim);font-family:"Orbitron";font-size:8.5px;letter-spacing:1px;padding:5px 2px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(150,170,230,.2),0 1px 2px #000;}
  .minibtn.on{color:var(--scan);border-color:rgba(67,224,200,.5);}
  .minibtn:active{transform:translateY(1px);}
  #console::before{content:"";position:absolute;top:6px;left:0;right:0;height:3px;background:repeating-linear-gradient(90deg,transparent 0 26px,rgba(120,140,200,.25) 26px 28px);pointer-events:none;}
  .bank{width:118px;flex:none;background:linear-gradient(160deg,var(--steel2),var(--steel));border:1px solid #000;border-radius:9px;padding:9px;display:flex;flex-direction:column;gap:7px;box-shadow:inset 0 1px 0 rgba(140,160,220,.15), inset 0 0 20px rgba(0,0,0,.4);}
  .bank .bh{font-family:"Orbitron";font-size:8px;letter-spacing:1.5px;color:var(--faint);text-align:center;margin-bottom:1px;}
  .lamp{display:flex;align-items:center;gap:7px;font-family:"Share Tech Mono";font-size:9.5px;color:var(--dim);letter-spacing:.5px;}
  .lamp .led{width:9px;height:9px;border-radius:50%;flex:none;background:#20263c;box-shadow:inset 0 0 3px #000;transition:.3s;}
  .lamp.on .led{box-shadow:0 0 8px currentColor,0 0 3px #fff inset;}
  .lamp.g.on .led{background:var(--green);color:var(--green);}
  .lamp.a.on .led{background:var(--amber);color:var(--amber);}
  .lamp.r.on .led{background:var(--red);color:var(--red);}
  .lamp.c.on .led{background:var(--scan);color:var(--scan);}
  .toggles{margin-top:auto;display:flex;gap:6px;justify-content:space-around;}
  .tgl{width:22px;height:34px;border-radius:5px;background:linear-gradient(180deg,#0a0e1a,#161d34);border:1px solid #000;position:relative;box-shadow:inset 0 0 6px #000;}
  .tgl::after{content:"";position:absolute;left:3px;right:3px;height:13px;top:3px;border-radius:3px;background:linear-gradient(180deg,#5a6690,#2f3a5e);transition:.18s;box-shadow:0 1px 2px #000;}
  .tgl.up::after{top:3px;background:linear-gradient(180deg,#7de0b0,#3aa070);}
  .tgl:not(.up)::after{top:18px;}
  .screenframe{flex:1;min-width:0;background:linear-gradient(160deg,#141a30,#0c1020);border:1px solid #000;border-radius:11px;padding:9px;box-shadow:inset 0 1px 0 rgba(140,160,220,.12);display:flex;flex-direction:column;}
  .screen{flex:1;min-height:0;position:relative;border-radius:8px;overflow:hidden;background:radial-gradient(ellipse at 50% 30%,#053029,#02110f 75%);border:2px solid #000;box-shadow:inset 0 0 40px rgba(0,0,0,.7), inset 0 0 12px rgba(10,255,206,.12), 0 0 0 1px rgba(10,255,206,.15);}
  .screen::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:5;background:repeating-linear-gradient(0deg,rgba(10,255,206,.05) 0 1px,transparent 1px 3px);}
  .screen::after{content:"";position:absolute;left:0;right:0;height:40px;top:-40px;z-index:6;pointer-events:none;background:linear-gradient(180deg,transparent,rgba(10,255,206,.08),transparent);animation:scanline 6s linear infinite;}
  @keyframes scanline{to{top:100%;}}
  .scr-inner{position:absolute;inset:0;z-index:4;padding:14px 18px;overflow:hidden;color:#7dffe0;font-family:"Rajdhani";display:flex;flex-direction:column;}
  .scr-idle{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;text-align:center;}
  .scr-idle .lg{font-family:"Orbitron";font-size:15px;letter-spacing:5px;color:var(--scan);text-shadow:0 0 12px var(--scan);}
  .scr-idle .sm{font-family:"Share Tech Mono";font-size:11px;color:#3a9a86;letter-spacing:2px;}
  .scr-idle .blink{animation:blink 1.3s steps(1) infinite;}
  /* idle default: a slow radar sweep (Slice 5) */
  .idle-radar{position:relative;width:74px;height:74px;margin-bottom:6px;border-radius:50%;overflow:hidden;box-shadow:0 0 16px rgba(10,255,206,.18) inset,0 0 10px rgba(10,255,206,.15);}
  .idle-radar .idle-ring{position:absolute;inset:24%;border:1px solid rgba(10,255,206,.28);border-radius:50%;}
  .idle-radar .idle-ring.r2{inset:6%;border-color:rgba(10,255,206,.16);}
  .idle-radar .idle-sweep{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,rgba(10,255,206,.55),rgba(10,255,206,0) 55deg,transparent 360deg);animation:radarSweep 3.4s linear infinite;transform-origin:50% 50%;}
  @keyframes radarSweep{to{transform:rotate(360deg);}}
  @keyframes blink{50%{opacity:0;}}
  .scr-head{display:flex;align-items:flex-start;gap:12px;flex:none;border-bottom:1px solid rgba(10,255,206,.2);padding-bottom:8px;margin-bottom:8px;}
  /* Holographic mini-projector (Slice 3): the selected thing's likeness cast as a cyan hologram —
     scanlines, a sweeping refresh line, soft glow, a projector-base glow and a slow bob. */
  .scr-portrait{position:relative;width:86px;height:86px;flex:none;border-radius:8px;border:1px solid rgba(10,255,206,.32);background:radial-gradient(circle at 50% 42%,rgba(10,255,206,.10),rgba(6,20,40,.5) 70%,transparent);display:flex;align-items:center;justify-content:center;}
  .holo-glow{position:absolute;inset:-5px;border-radius:11px;box-shadow:0 0 18px rgba(10,255,206,.32);pointer-events:none;}
  .holo-screen{position:absolute;inset:0;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .holo-art{filter:drop-shadow(0 0 5px rgba(10,255,206,.55)) brightness(1.06) saturate(1.12);animation:holobob 4.2s ease-in-out infinite;transform-origin:50% 60%;}
  @keyframes holobob{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-3px) scale(1.02);}}
  .holo-tint{position:absolute;inset:0;background:radial-gradient(circle at 50% 45%,rgba(10,255,206,.10),rgba(10,120,255,.18));mix-blend-mode:screen;pointer-events:none;}
  .holo-scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(10,255,206,.11) 0 1px,transparent 1px 3px);mix-blend-mode:screen;pointer-events:none;opacity:.7;}
  .holo-sweep{position:absolute;left:0;right:0;top:-18px;height:18px;background:linear-gradient(rgba(10,255,206,0),rgba(10,255,206,.22),rgba(10,255,206,0));animation:holoSweep 2.8s linear infinite;pointer-events:none;}
  @keyframes holoSweep{0%{top:-18px;}100%{top:100%;}}
  .holo-base{position:absolute;left:50%;bottom:-5px;width:72%;height:9px;transform:translateX(-50%);background:radial-gradient(ellipse,rgba(10,255,206,.55),transparent 70%);filter:blur(2px);pointer-events:none;}
  .scr-titles{flex:1;min-width:0;}
  .scr-kicker{font-family:"Share Tech Mono";font-size:10px;letter-spacing:2px;color:var(--amber);text-transform:uppercase;}
  .scr-name{font-family:"Orbitron";font-size:19px;font-weight:700;color:#eafffb;text-shadow:0 0 14px rgba(10,255,206,.5);line-height:1.1;margin:1px 0 2px;}
  .scr-creed{font-family:"Rajdhani";font-style:italic;font-size:13px;color:var(--scan);}
  .scr-cols{flex:1;min-height:0;display:flex;gap:16px;}
  .scr-desc{flex:1;font-size:13.5px;line-height:1.5;color:#a8e8d8;overflow-y:auto;padding-right:6px;white-space:pre-wrap;}
  .scr-nodata{font-family:"Share Tech Mono";font-size:11.5px;color:#3a9a86;letter-spacing:1px;opacity:.72;font-style:italic;}
  .scr-stats{width:158px;flex:none;font-family:"Share Tech Mono";font-size:11px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;}
  .scr-stat{display:flex;justify-content:space-between;gap:8px;border-bottom:1px dotted rgba(10,255,206,.15);padding-bottom:3px;}
  .scr-stat .k{color:#3a9a86;}.scr-stat .v{color:#9dffe8;text-align:right;}
  .scr-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
  .scr-chip{font-family:"Share Tech Mono";font-size:10px;padding:2px 7px;border:1px solid rgba(10,255,206,.3);border-radius:10px;color:#9dffe8;cursor:pointer;transition:.12s;}
  .scr-chip:hover{background:rgba(10,255,206,.15);}
  .scr-chip .cd{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle;}
  .scr-poi{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px dotted rgba(10,255,206,.12);cursor:pointer;}
  .scr-poi:hover{background:rgba(10,255,206,.06);}
  .scr-poi .pic{width:22px;height:22px;flex:none;}
  .scr-poi .pn{font-size:13px;color:#c8fff0;font-weight:600;}
  .scr-poi .pt{font-size:10px;color:#3a9a86;font-family:"Share Tech Mono";}
  .scr-poi .pd{font-size:11.5px;color:#8fd0c4;line-height:1.35;}
  .scr-desc::-webkit-scrollbar,.scr-stats::-webkit-scrollbar{width:6px;}
  .scr-desc::-webkit-scrollbar-thumb,.scr-stats::-webkit-scrollbar-thumb{background:rgba(10,255,206,.25);border-radius:3px;}
  .rcluster{width:158px;flex:none;background:linear-gradient(160deg,var(--steel2),var(--steel));border:1px solid #000;border-radius:9px;padding:10px;display:flex;flex-direction:column;gap:8px;box-shadow:inset 0 1px 0 rgba(140,160,220,.15), inset 0 0 20px rgba(0,0,0,.4);}
  .rcluster .bh{font-family:"Orbitron";font-size:8px;letter-spacing:1.5px;color:var(--faint);text-align:center;}
  .bigbtn{font-family:"Orbitron";font-size:10px;letter-spacing:1px;padding:9px;border-radius:7px;border:1px solid #000;cursor:pointer;background:linear-gradient(180deg,var(--steelhi),var(--steel));color:var(--dim);box-shadow:inset 0 1px 0 rgba(150,170,230,.2),0 2px 3px #000;transition:.1s;}
  .bigbtn:hover{color:var(--ink);}
  .bigbtn:active{transform:translateY(1px);box-shadow:inset 0 2px 4px #000;}
  .bigbtn.amber{color:var(--amber);border-color:rgba(255,178,87,.3);}
  .bigbtn.scan{color:var(--scan);border-color:rgba(67,224,200,.3);}
  .knobs{display:flex;gap:8px;justify-content:space-around;margin-top:auto;}
  .knob{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .knob .dial{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#3a466e,#141a30);border:1px solid #000;position:relative;box-shadow:0 2px 4px #000, inset 0 1px 2px rgba(150,170,230,.25);cursor:pointer;}
  .knob .dial::after{content:"";position:absolute;left:50%;top:4px;width:2px;height:11px;background:var(--scan);transform:translateX(-50%) rotate(var(--r,-90deg));border-radius:2px;box-shadow:0 0 5px var(--scan);transform-origin:50% 13px;transition:.2s;}
  .knob .kl{font-family:"Share Tech Mono";font-size:8px;color:var(--faint);letter-spacing:.5px;}
  .meter{height:7px;border-radius:4px;background:#0a0e1a;border:1px solid #000;overflow:hidden;box-shadow:inset 0 0 4px #000;}
  .meter i{display:block;height:100%;width:60%;background:linear-gradient(90deg,var(--green),var(--scan));box-shadow:0 0 8px var(--scan);transition:width .5s;}
  .modal{position:fixed;inset:0;z-index:400;background:rgba(2,4,8,.82);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:24px;}
  .modal.show{display:flex;}

    applyPreset(name){const p=PRESETS[name]||PRESETS.realistic;this.master=p.master;for(let i=0;i<this.n;i++){this.speeds[i]=baseSpeed(i,this.n,p.falloff);if(p.dirs==='all+')this.dirs[i]=1;else if(p.dirs==='alt')this.dirs[i]=(i%2===0)?1:-1;else if(p.dirs==='rand')this.dirs[i]=Math.random()<0.5?-1:1;}}

</script>

// layered-spiral images — swirl the player's published image into rotating rings (same engine as the DM)
const spiralLiveImg={};
function mountSpiralImages(){

  Object.keys(spiralLiveImg).forEach(id=>{if(!ids.has(id)){try{spiralLiveImg[id].engine.destroy();}catch(e){}delete spiralLiveImg[id];}});
  document.querySelectorAll('[data-spiral]').forEach(el=>{
    const id=el.dataset.spiral;const inst=(MAP.instances||[]).find(x=>x.id===id);if(!inst||!inst.spiral||!inst.spiral.on)return;
    const cv=el.querySelector('canvas.spiralcanvas');if(!cv)return;const src=inst.look&&inst.look.src;if(!src)return;
    let rec=spiralLiveImg[id];
    if(!rec){const eng=new DiffSpinGalaxy(cv,{rings:inst.spiral.rings||6,corePulse:false});
      eng._fit=function(){this.canvas.width=256;this.canvas.height=256;this.ctx.setTransform(1,0,0,1,0,0);this.cssW=256;this.cssH=256;};   // fixed buffer (CSS scales it) — robust to layout timing

    if(rec.cv!==cv){rec.engine.canvas=cv;rec.engine.ctx=cv.getContext('2d');rec.engine._fit();rec.cv=cv;}
    if(rec.imageURL!==src){rec.imageURL=src;rec.engine.setImage(src).then(()=>{rec.engine.fromConfig(inst.spiral);rec.engine.start();});}

}

function coreScreen(i){return `<div class="scr-head">${portrait(`<div style="width:66px;height:66px">${art(i.look,true)}</div>`)}<div class="scr-titles"><div class="scr-kicker" style="color:var(--gold)">GALACTIC CORE</div><div class="scr-name">${esc(i.name)}</div><div class="scr-creed">The song at the center of everything</div></div></div>
  <div class="scr-cols"><div class="scr-desc">${esc(i.desc)}</div><div class="scr-stats"><div class="scr-stat"><span class="k">TYPE</span><span class="v">AETHER SOURCE</span></div><div class="scr-stat"><span class="k">POSITION</span><span class="v">GALACTIC CENTER</span></div><div class="scr-stat"><span class="k">OUTPUT</span><span class="v" style="color:var(--gold)">∞</span></div><div class="scr-stat"><span class="k">STATUS</span><span class="v" style="color:var(--scan)">RADIANT</span></div></div></div>`;}

/* ---- ambient fx ---- */
let ambient=null;
function applyFx(){const f=MAP.mapFx||{};const bg=MAP.bg3d,solid=!!(bg&&(bg.template==="solid"||bg.template==="glow"));
  if(!ambient)ambient=new AmbientFX($("#fxCanvas"));
  const sp=(f.sparkles!==false)&&!solid,sh=!!f.shooting&&!solid;   // solid/glow bg → no ambient starfield
  ambient.set({sparkles:sp,shooting:sh,density:f.density!=null?f.density:0.5,speed:f.speed!=null?f.speed:1,rate:f.rate!=null?f.rate:0.3,color:f.color||"#cbd6ff"});if(sp||sh)ambient.start();else ambient.stop();}

/* ---- campaigns ---- */
const CAMP_KEY="stardust-campaigns";
function loadCampaigns(){try{return JSON.parse(localStorage.getItem(CAMP_KEY)||"[]");}catch(e){return [];}}
$("#campBtn").onclick=openCamp;$("#campClose").onclick=()=>$("#campModal").classList.remove("show");
function openCamp(){const list=loadCampaigns();const body=$("#campBody");
  body.innerHTML=(list.length?list.map(c=>`<div class="camprow" data-load="${c.id}"><div class="ci"><div class="n">${esc(c.name)}</div><div class="m">Updated ${new Date(c.savedAt).toLocaleString()} · ${(c.map&&c.map.instances?c.map.instances.length:0)} bodies · ${(c.map&&c.map.sectors?c.map.sectors.length:0)} systems</div></div><div class="go">OPEN ▶</div></div>`).join(""):`<div style="font-size:13px;color:var(--faint);padding:8px 0;line-height:1.6">No published campaign maps found on this device.<br>Publish one from <b>Map Studio</b> (they share this browser's storage), import a map file, or load the built-in sample galaxy below.</div>`);
  $("#campModal").classList.add("show");
  body.querySelectorAll("[data-load]").forEach(el=>el.onclick=()=>{const c=loadCampaigns().find(x=>x.id===el.dataset.load);if(c&&c.map){loadMap(c.map);$("#campModal").classList.remove("show");toast("Loaded “"+c.name+"”");}});
}
$("#campSample").onclick=()=>{loadMap(sampleMap());$("#campModal").classList.remove("show");toast("Loaded sample galaxy");};
$("#campImport").onclick=()=>$("#mapFile").click();
$("#mapFile").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const m=JSON.parse(r.result);loadMap(m);$("#campModal").classList.remove("show");toast("Loaded map file");}catch(err){toast("Couldn't read that file");}};r.readAsText(f);e.target.value="";};
function loadMap(m){MAP=normalizeMap(m);$("#mapTitle").textContent=(MAP.meta&&MAP.meta.name)?MAP.meta.name.toUpperCase().slice(0,42):"STARDUST RHAPSODY";render();applyFx();fit(false);showIdle();}
function normalizeMap(m){m=m||{};return {type:"stardust-map",version:2,meta:m.meta||{name:"Untitled Map"},background:m.background||null,centerGalaxy:m.centerGalaxy||null,bg3d:m.bg3d||null,
  mapFx:Object.assign({sparkles:true,shooting:false,nebula:true,density:0.5,speed:1,rate:0.3,color:"#cbd6ff",nebColor:"#2a1a5a",nebColor2:"#0c0820"},m.mapFx||{}),
  sectors:(m.sectors||[]).map(s=>({parent:null,meta:false,fx:{sparkle:false,nebula:false,nebulaColor:s.color,shoot:false},...s})),
  instances:(m.instances||[]).map(i=>({pois:[],fx:{sparkle:false,nebula:false,nebulaColor:"#8f78e6",shoot:false},role:"",...i,look:i.look||{kind:i.kind}}))};}

/* ---- console ambient life ---- */
function updateDialZoom(){const d=$("#dialZoom");if(!d)return;const t=(view.scale-0.08)/(6-0.08);d.style.setProperty("--r",(t*270-135)+"deg");}
$("#dialZoom").style.setProperty("--r","-90deg");$("#dialGain").style.setProperty("--r","20deg");
$("#dialZoom").onclick=()=>{const {w,h}=paneSize();zoomAround(w/2,h/2,1.3);beep(720,0.05);};
$("#dialGain").onclick=()=>{$("#lampScan").classList.toggle("on");beep(520,0.05);};

/* ---- HELM: functional + flavour controls (Slice 7) ---- */
// Tiny WebAudio blips for that clicky spaceship feel (respects the SFX mute).
let sfxOn=true,_actx=null;
function beep(freq,dur){if(!sfxOn)return;try{_actx=_actx||new (window.AudioContext||window.webkitAudioContext)();const o=_actx.createOscillator(),g=_actx.createGain();o.type="square";o.frequency.value=freq||660;g.gain.value=0.035;o.connect(g);g.connect(_actx.destination);const t=_actx.currentTime;o.start(t);g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.06));o.stop(t+(dur||0.06)+0.01);}catch(e){}}
const deckEl=$("#console");
// D-pad pan — steps scaled by the THRUST (pan-rate) slider.
let panRate=40;
function panStep(dir){const step=20+(panRate/100)*200;if(dir==="up")view.y+=step;else if(dir==="down")view.y-=step;else if(dir==="left")view.x+=step;else if(dir==="right")view.x-=step;else{fit(true);beep(600,0.06);return;}apply(true);beep(760,0.04);}
document.querySelectorAll(".dpad button").forEach(b=>b.onclick=()=>panStep(b.dataset.pan));
const pr=$("#panRate");if(pr)pr.oninput=e=>{panRate=+e.target.value;$("#panRateV").textContent=panRate;};
// TINT dial — steps the info-panel screen hue through cyan → green → blue → amber → red.
let tintStep=0;const TINTS=[0,90,180,255,300];
$("#dialTint").onclick=()=>{tintStep=(tintStep+1)%TINTS.length;const h=TINTS[tintStep];deckEl.style.setProperty("--tint-hue",h+"deg");$("#dialTint").style.setProperty("--r",(tintStep/(TINTS.length-1)*270-135)+"deg");beep(480+tintStep*60,0.05);};
$("#dialTint").style.setProperty("--r","-135deg");
// TUNE dial — signal tuning with a sweet spot (perfect resolution). Further from it → more screen
// distortion. Click steps it around the 0–100 range; distortion = |v - sweetSpot| normalised.
let tune=50;const SWEET=50;
function applyTune(){const d=Math.min(1,Math.abs(tune-SWEET)/50);deckEl.style.setProperty("--distort",d.toFixed(3));$("#dialTune").style.setProperty("--r",(tune/100*270-135)+"deg");}
$("#dialTune").onclick=()=>{tune=(tune+12)%101;applyTune();beep(300+tune*4,0.05);};
applyTune();
// A faint always-present flicker even near the sweet spot (that CRT never sleeps).
setInterval(()=>{if(Math.random()<0.12){const base=Math.min(1,Math.abs(tune-SWEET)/50);deckEl.style.setProperty("--distort",Math.min(1,base+0.12).toFixed(3));setTimeout(()=>deckEl.style.setProperty("--distort",base.toFixed(3)),90);}},1600);
// LIGHT dial — nudges scene lighting: brightens the 3D scene if shown, else the 2D stage.
let lightStep=0;const LIGHTS=[1,1.18,1.35,0.85];
$("#btnLight").onclick=()=>{lightStep=(lightStep+1)%LIGHTS.length;const l=LIGHTS[lightStep];try{if(window.Map3D&&window.Map3D.setLightLevel)window.Map3D.setLightLevel(l);}catch(e){}const st=$("#stage");if(st)st.style.filter=l===1?"":`brightness(${l})`;$("#btnLight").classList.toggle("on",l!==1);beep(420,0.05);};
$("#btnSfx").onclick=()=>{sfxOn=!sfxOn;$("#btnSfx").classList.toggle("on",sfxOn);if(sfxOn)beep(660,0.06);};
["tgl1","tgl2","tgl3"].forEach(id=>$("#"+id).onclick=()=>$("#"+id).classList.toggle("up"));
setInterval(()=>{const l=$("#lampComm");if(Math.random()<0.3)l.classList.toggle("on");},1400);
setInterval(()=>{$("#sigMeter").style.width=(selectedId?72:52)+Math.random()*22+"%";},2200);
$("#sigMeter").style.width="58%";
window.addEventListener("resize",()=>{if(selectedId){const i=MAP.instances.find(x=>x.id===selectedId);if(i){flyTo(i.x,i.y,i.kind==="galaxy"?fitZoomFor(i.size*3,i.size*3):clamp(1400/(i.size||50),1.4,4.2));return;}}fit(false);});
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1800);}

/* ---- init: last published campaign, else sample ---- */
(function init(){const list=loadCampaigns();if(list.length){const latest=list.slice().sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt))[0];loadMap(latest.map);}else{loadMap(sampleMap());}})();
</script>
<!-- ============================================================
     CAMPAIGN DB BRIDGE (platform integration — Phase U, slice 4)
     When the Console is embedded under /dnd with ?campaign=<id> it loads the
     campaign's published map from the maps API instead of localStorage. With
     ?map=<id> it opens that specific row; otherwise it picks the campaign's
     published map. The localStorage "Load campaign" button is hidden.
============================================================ -->
<script>
(function consoleBridge(){
  const qs = new URLSearchParams(location.search);
  const campaign = qs.get("campaign");
  const wanted = qs.get("map");

  let curData = null, curStamp = null, curMapId = wanted || null;
  // Expose the live map to the 3D viewer (map3d.js); a 3D pick drives the CRT readout.
  window.mapData = () => curData || (typeof MAP !== "undefined" ? MAP : { instances: [] });
  window.map3dSelect = (id) => { if(id) select({ type:"instance", id }); };
  // A 3D surface-POI pick shows the parent body's readout — same as clicking a POI on the 2D map.
  window.map3dSelectPoi = (instId, poiId) => { if(instId) select({ type:"instance", id:instId }); };
  // Paint the 2D backdrop to match the published sky (parity with the 3D viewer).
  function applySky(data){ try{ if(window.Sky2D){ const cv=document.getElementById("skyCanvas"); if(cv){ window.Sky2D.mount(cv); window.Sky2D.set((data&&data.bg3d)||undefined); } }
    const bg=data&&data.bg3d, solid=bg&&(bg.template==="solid"||bg.template==="glow"), mp=document.getElementById("mapPane");
    if(mp) mp.style.background = solid ? (bg.baseColor||"#010a13") : "";   // solid/glow → the map pane is just the colour (no space gradient)
  }catch(e){} }
  applySky(null);   // default sky until a map loads
  // If the DM edits a published map while a player is in 3D, refresh the 3D scene too.
  function apply(data, name, announce){
    curData = data; loadMap(data); applySky(data);
    if(window.Map3D && window.Map3D.isShown()) window.Map3D.setData(data);
    if(announce) toast('◈ '+((name||"Campaign map")).toUpperCase());
  }

  if(!campaign) return;                        // stand-alone → sample map (3D toggle still works)
  const api = "/api/dnd/campaigns/" + encodeURIComponent(campaign) + "/maps";
  const campBtn = document.getElementById("campBtn");
  if(campBtn) campBtn.style.display = "none";   // localStorage list — not used on the platform

  // The published map reaches players in ~real time. A full (re)load paints the whole map
  // (and the 3D scene, if shown); the incremental poll patches only DM-moved "live" elements
  // so the player's pan/zoom/selection survive. Any broader (structural) change → full reload.
  let lastStamp = null, structSig = "";
  const liveSig = arr => (arr||[]).filter(x=>x.live).map(x=>x.id+":"+Math.round(x.x)+":"+Math.round(x.y)).sort().join("|");
  // Signature of everything the cheap live-patch can't cover: non-live instances (full), live ids, sectors/systems.
  const sig = d => { try{ return JSON.stringify((d.instances||[]).map(x=> x.live ? {id:x.id} : x)) + "|" + JSON.stringify(d.sectors||[]) + "|" + JSON.stringify(d.systems||[]); }catch(e){ return String(Math.random()); } };
  async function load(first){
    try{
      if(!curMapId){
        const lr = await fetch(api);
        if(!lr.ok) return;
        const { maps } = await lr.json();
        const pub = (maps || []).find(m => m.published && m.kind === "built");
        if(!pub) return;                        // nothing to show → keep sample
        curMapId = pub.id;
      }
      const r = await fetch(api + "?mapId=" + encodeURIComponent(curMapId));
      if(!r.ok) return;
      const { map } = await r.json();
      if(map && map.data){ curStamp = lastStamp = map.updated_at||null; structSig = sig(map.data); apply(map.data, map.name, first); }
    }catch(e){ /* offline / unmigrated → sample map stays */ }
  }
  // Poll for DM changes; patch live moves in place, but repaint fully on any structural edit.
  async function poll(){
    if(!curMapId) return;
    try{
      const r = await fetch(api + "?mapId=" + encodeURIComponent(curMapId));
      if(!r.ok) return;
      const { map } = await r.json();
      if(!map || !map.data) return;
      if(map.updated_at && map.updated_at === lastStamp) return;   // unchanged since last poll
      curStamp = lastStamp = map.updated_at || lastStamp;
      if(sig(map.data) !== structSig){          // new/edited content → repaint the whole map + 3D scene
        structSig = sig(map.data); apply(map.data, map.name, false); return;
      }
      if(liveSig(map.data.instances) === liveSig(MAP.instances)) return;   // no live change
      const newInst = map.data.instances || [];
      newInst.filter(n=>n.live).forEach(n=>{ const cur=(MAP.instances||[]).find(x=>x.id===n.id);
        if(cur){ cur.x=n.x; cur.y=n.y; cur.live=true; } else { MAP.instances.push(n); } });
      MAP.instances = (MAP.instances||[]).filter(ci => !(ci.live && !newInst.some(n=>n.id===ci.id && n.live)));
      curData = MAP;                              // keep mapData()/3D pick in sync
      render();                                  // rebuild bodies/labels at the current view
      if(window.Map3D && window.Map3D.isShown()) window.Map3D.setData(MAP);   // reflect live moves in 3D
    }catch(e){}
  }
  load(true).then(()=>{ setInterval(poll, 4000); });         // live updates
})();
</script>
